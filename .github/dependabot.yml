version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      python:
        patterns: ["*"]
    ignore:
      - dependency-name: "torch"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
