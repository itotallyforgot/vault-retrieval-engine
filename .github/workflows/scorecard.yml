# OSSF Scorecard — standalone workflow for this public repo.
#
# Copied from the central paved-path template (itotallyforgot/.github
# templates/scorecard.yml@v1). Scorecard needs repository-level permissions
# that a reusable workflow cannot cleanly inherit, so it lives here as a
# standalone scheduled workflow rather than a workflow_call.
#
# Third-party actions are pinned to a full commit SHA with a trailing version
# comment, matching the fleet standard.

name: scorecard

on:
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  analysis:
    name: scorecard-analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the public scorecard API
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
          category: scorecard
