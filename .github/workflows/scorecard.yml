# OSSF Scorecard — standalone workflow for this public repo.
#
# Copied from the central paved-path template (itotallyforgot/.github
# templates/scorecard.yml@v1). Scorecard needs repository-level permissions
# that a reusable workflow cannot cleanly inherit, so it lives here as a
# standalone scheduled workflow rather than a workflow_call.
#
# Third-party actions are pinned to a full commit SHA with a trailing version
# comment, matching the fleet standard.

name: scorecard

on:
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  analysis:
    name: scorecard-analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the public scorecard API
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: results.sarif
          category: scorecard
