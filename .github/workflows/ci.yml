name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Standard lint (ruff) + typecheck (pyright) + test (pytest) come from the
  # central paved path. Emits the frozen aggregate check `ci-passed`.
  ci:
    permissions:
      contents: read
      security-events: write
    uses: itotallyforgot/.github/.github/workflows/ci-python-uv.yml@v1
    with:
      working-directory: .

  # Repo-specific: shell smoke harnesses. The paved path does not cover these.
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Run shell smoke harnesses
        run: |
          for harness in \
            tests/smoke_check_blocked_terms.sh \
            tests/smoke_install_vault_overlays_dispatcher.sh \
            tests/smoke_post_commit_dispatcher.sh; do
            echo "::group::$harness"
            bash "$harness"
            echo "::endgroup::"
          done

  # Repo-specific: retrieval eval against the mock embedder + sample vault,
  # plus the bag-of-words adversarial regression gate. Not covered by the paved path.
  eval-rig-mock:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync deps
        run: uv sync --group dev
      - name: Run eval against mock embedder + sample vault
        run: |
          uv run vault-engine --vault tests/fixtures/sample_vault eval \
            --fixtures tests/fixtures/eval_fixtures.jsonl \
            --embedder mock \
            --threshold 0.85
      - name: Bag-of-words adversarial regression gate
        run: uv run pytest tests/test_bow_adversarial.py -q
