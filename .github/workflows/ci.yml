name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Standard lint (ruff) + typecheck (pyright) + test (pytest) come from the
  # central paved path. Emits the frozen aggregate check `ci-passed`.
  # NOTE: jobs.<job_id>.uses (reusable workflow call) does not support
  # timeout-minutes -- that key belongs to the internal lint/typecheck/test
  # jobs defined in itotallyforgot/.github, out of this repo's reach.
  ci:
    permissions:
      contents: read
      security-events: write
    uses: itotallyforgot/.github/.github/workflows/ci-python-uv.yml@692d623eabad744c77959360bf06735e5c9be393
    with:
      working-directory: .
      # Measured baseline (uv run pytest --cov --cov-report=term-missing): 92%
      # total (3986 stmts, 313 missed). Floor set just below that so real
      # regressions fail the build without pinning to the exact number.
      cov-floor: 91

  # Repo-specific: shell smoke harnesses. The paved path does not cover these.
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run shell smoke harnesses
        run: |
          for harness in \
            tests/smoke_check_blocked_terms.sh \
            tests/smoke_install_vault_overlays_dispatcher.sh \
            tests/smoke_post_commit_dispatcher.sh; do
            echo "::group::$harness"
            bash "$harness"
            echo "::endgroup::"
          done

  # Repo-specific: retrieval eval against the mock embedder + sample vault,
  # plus the bag-of-words adversarial regression gate. Not covered by the paved path.
  # Runs in parallel with `ci` (no `needs:`) instead of serialized behind it --
  # it doesn't consume any artifact from that job, so serializing only added
  # wall-clock time for no benefit.
  eval-rig-mock:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      # --locked: fail loudly on lockfile drift instead of silently
      # resolving an unlocked environment.
      - name: Sync deps
        run: uv sync --locked --group dev
      - name: Run eval against mock embedder + sample vault
        run: |
          uv run vault-engine --vault tests/fixtures/sample_vault eval \
            --fixtures tests/fixtures/eval_fixtures.jsonl \
            --embedder mock \
            --threshold 0.85
      - name: Bag-of-words adversarial regression gate
        run: uv run pytest tests/test_bow_adversarial.py -q
