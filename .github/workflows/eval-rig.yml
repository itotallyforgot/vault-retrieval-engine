name: eval-rig

on:
  push:
    branches: [main, p2-mcp-tailscale-hooks]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync deps
        run: uv sync --group dev
      - name: Run pytest
        run: uv run pytest -q --tb=short

  eval-rig-mock:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync deps
        run: uv sync --group dev
      - name: Run eval against mock embedder + sample vault
        run: |
          uv run vault-engine eval \
            --vault tests/fixtures/sample_vault \
            --fixtures tests/fixtures/eval_fixtures.jsonl \
            --embedder mock \
            --threshold 0.85
