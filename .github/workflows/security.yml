name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Central security baseline: harden-runner, gitleaks, zizmor, dependency-review
  # (trufflehog opt-in, off). Emits the frozen aggregate check `security-passed`.
  # NOTE: a job that calls a reusable workflow via `uses:` cannot also declare
  # timeout-minutes (not a supported key on that job shape) -- the internal
  # jobs live in itotallyforgot/.github, out of this repo's reach.
  baseline:
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    # No `secrets: inherit`: the built-in GITHUB_TOKEN is auto-available inside
    # reusable workflows; the reusable's gitleaks step reads it from its own
    # secrets context. Inheriting all secrets would be needlessly broad.
    uses: itotallyforgot/.github/.github/workflows/security-baseline.yml@9f91cefde7f0bf2304c33c716e495cd6666d3afa
