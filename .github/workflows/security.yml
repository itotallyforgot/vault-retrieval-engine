name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Central security baseline: harden-runner, gitleaks, zizmor, dependency-review
  # (trufflehog opt-in, off). Emits the frozen aggregate check `security-passed`.
  baseline:
    permissions:
      contents: read
      security-events: write
    # No `secrets: inherit`: the built-in GITHUB_TOKEN is auto-available inside
    # reusable workflows; the reusable's gitleaks step reads it from its own
    # secrets context. Inheriting all secrets would be needlessly broad.
    # TEMP (verification only — revert to @v1): point at the zizmor-fix branch
    # so the fixed reusable runs. ci.yml below keeps @v1 as the real tag test.
    uses: itotallyforgot/.github/.github/workflows/security-baseline.yml@fix/zizmor-firstparty-unpinned-uses
