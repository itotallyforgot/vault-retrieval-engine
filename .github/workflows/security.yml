name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Central security baseline: harden-runner, gitleaks, zizmor, dependency-review
  # (trufflehog opt-in, off). Emits the frozen aggregate check `security-passed`.
  baseline:
    permissions:
      contents: read
      security-events: write
    uses: itotallyforgot/.github/.github/workflows/security-baseline.yml@v1
    secrets: inherit
